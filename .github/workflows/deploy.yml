name: CI/CD Pipeline - devops_labmid

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t yourusername/devops_labmid:latest .

      - name: Push Docker Image
        run: docker push yourusername/devops_labmid:latest

      - name: Deploy Container
        run: |
          docker pull yourusername/devops_labmid:latest
          docker stop devops_labmid || true
          docker rm devops_labmid || true
          docker run -d --name devops_labmid -p 5000:5000 yourusername/devops_labmid:latest