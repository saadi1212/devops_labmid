name: CI/CD Pipeline - devops_labmid

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t devops_labmid:latest .

      - name: Run Docker Container
        run: docker run -d --name devops_labmid -p 5000:5000 devops_labmid:latest

      - name: Check Running Container
        run: docker ps
